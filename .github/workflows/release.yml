name: Release

on:
  schedule:
    # Once per night (02:00 UTC).
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      should_release: ${{ steps.changes.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Check for releasable changes since last tag
        id: changes
        run: |
          set -euo pipefail
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$LATEST" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No existing v* tag; will create the first release."
            exit 0
          fi

          # Same paths that previously gated push-triggered releases.
          if git diff --quiet "${LATEST}..HEAD" -- \
            src \
            src-tauri \
            public \
            scripts \
            package.json \
            pnpm-lock.yaml \
            index.html \
            'vite.config.*' \
            'tsconfig*.json' \
            .npmrc \
            .github/workflows/release.yml
          then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No releasable changes since ${LATEST}; skipping."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Releasable changes found since ${LATEST}."
            git log --oneline "${LATEST}..HEAD" -- \
              src \
              src-tauri \
              public \
              scripts \
              package.json \
              pnpm-lock.yaml \
              index.html \
              'vite.config.*' \
              'tsconfig*.json' \
              .npmrc \
              .github/workflows/release.yml \
              | head -n 20
          fi

      - name: Compute next patch version
        id: bump
        if: steps.changes.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$LATEST" ]; then
            VERSION="$(jq -r .version package.json)"
          else
            VER="${LATEST#v}"
            MAJOR="$(echo "$VER" | cut -d. -f1)"
            MINOR="$(echo "$VER" | cut -d. -f2)"
            PATCH="$(echo "$VER" | cut -d. -f3)"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next release version: ${VERSION}"

  publish:
    name: Publish (Apple Silicon)
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v5
        with:
          version: 9.7.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: tauri-macos
          cache-on-failure: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # tauri-action@v1 does not accept a `version` input — write it into the
      # config files and pass an explicit tag so we don't keep overwriting v0.1.0.
      - name: Apply release version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          sed -i.bak -E "s/^version = \"[0-9]+\\.[0-9]+\\.[0-9]+\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          echo "package.json=$(jq -r .version package.json)"
          echo "tauri.conf.json=$(jq -r .version src-tauri/tauri.conf.json)"
          grep -E '^version = ' src-tauri/Cargo.toml

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc signing (free). For Developer ID + notarization later, replace
          # with repo secrets and remove APPLE_SIGNING_IDENTITY="-" from tauri.conf.json.
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: v${{ needs.version.outputs.version }}
          releaseName: CO Messenger v${{ needs.version.outputs.version }}
          releaseBody: |
            Nightly macOS (Apple Silicon) build from `main` (ad-hoc signed, **not** notarized).

            ### Install
            1. Download the `.dmg` and open it.
            2. Drag **CO Messenger** to Applications.
            3. If Gatekeeper blocks it: **right-click → Open** → confirm **Open**.
            4. If that doesn’t show an **Open** option:
               - Open **System Settings → Privacy & Security**.
               - Scroll to the message about CO Messenger being blocked.
               - Click **Open Anyway**, then confirm.

            Network and Keychain are enabled by default in this build.
          releaseDraft: false
          prerelease: true
