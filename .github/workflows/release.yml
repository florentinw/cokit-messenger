name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next patch version
        id: bump
        run: |
          set -euo pipefail
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$LATEST" ]; then
            VERSION="$(jq -r .version package.json)"
          else
            VER="${LATEST#v}"
            MAJOR="$(echo "$VER" | cut -d. -f1)"
            MINOR="$(echo "$VER" | cut -d. -f2)"
            PATCH="$(echo "$VER" | cut -d. -f3)"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next release version: ${VERSION}"

  publish:
    name: Publish (${{ matrix.arch }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native ARM on macos-latest — omit --target so binary lands in target/release/
          - platform: macos-latest
            arch: aarch64
            args: ''
          - platform: macos-latest
            arch: x86_64
            args: --target x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.7.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.arch }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc signing (free). For Developer ID + notarization later, replace
          # with repo secrets and remove APPLE_SIGNING_IDENTITY="-" from tauri.conf.json.
          APPLE_SIGNING_IDENTITY: "-"
        with:
          version: ${{ needs.version.outputs.version }}
          tagName: v__VERSION__
          releaseName: CO Messenger v__VERSION__
          releaseBody: |
            Automated macOS build from `main` (ad-hoc signed, **not** notarized).

            ### Install
            1. Download the `.dmg` for your Mac (Apple Silicon = `aarch64`, Intel = `x86_64`).
            2. Open the disk image and drag **CO Messenger** to Applications.
            3. If Gatekeeper blocks it: **right-click → Open** → confirm **Open**.

            Network and Keychain are enabled by default in this build.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
