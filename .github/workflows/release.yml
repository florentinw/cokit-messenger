name: Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'index.html'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - '.npmrc'
      - '.github/workflows/release.yml'

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next patch version
        id: bump
        run: |
          set -euo pipefail
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$LATEST" ]; then
            VERSION="$(jq -r .version package.json)"
          else
            VER="${LATEST#v}"
            MAJOR="$(echo "$VER" | cut -d. -f1)"
            MINOR="$(echo "$VER" | cut -d. -f2)"
            PATCH="$(echo "$VER" | cut -d. -f3)"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next release version: ${VERSION}"

  publish:
    name: Publish (Apple Silicon)
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.7.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: tauri-macos
          cache-on-failure: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc signing (free). For Developer ID + notarization later, replace
          # with repo secrets and remove APPLE_SIGNING_IDENTITY="-" from tauri.conf.json.
          APPLE_SIGNING_IDENTITY: "-"
        with:
          version: ${{ needs.version.outputs.version }}
          tagName: v__VERSION__
          releaseName: CO Messenger v__VERSION__
          releaseBody: |
            Automated macOS (Apple Silicon) build from `main` (ad-hoc signed, **not** notarized).

            ### Install
            1. Download the `.dmg` and open it.
            2. Drag **CO Messenger** to Applications.
            3. If Gatekeeper blocks it: **right-click → Open** → confirm **Open**.
            4. If that doesn’t show an **Open** option:
               - Open **System Settings → Privacy & Security**.
               - Scroll to the message about CO Messenger being blocked.
               - Click **Open Anyway**, then confirm.

            Network and Keychain are enabled by default in this build.
          releaseDraft: false
          prerelease: true
