name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'src-tauri/**'
              - 'public/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'index.html'
              - 'vite.config.*'
              - 'tsconfig*.json'
              - '.npmrc'
              - '.github/workflows/**'

  compile:
    name: Compile
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.7.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: tauri-macos
          cache-on-failure: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Debug build still compiles frontend + Rust + bundles the app, but skips
      # release optimizations (the ~13m bottleneck). Full release builds stay on
      # the Release workflow when merging to main.
      - name: Build (Apple Silicon, debug)
        run: pnpm tauri build --debug

  # Required check name stays "Build" so docs-only PRs are not stuck behind a
  # skipped macos job.
  build:
    name: Build
    needs: [changes, compile]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          set -euo pipefail
          if [[ "${{ needs.changes.outputs.code }}" != "true" ]]; then
            echo "No code paths changed — skipping compile."
            exit 0
          fi
          case "${{ needs.compile.result }}" in
            success) exit 0 ;;
            *)
              echo "Compile result: ${{ needs.compile.result }}"
              exit 1
              ;;
          esac
