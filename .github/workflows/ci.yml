name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.7.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: tauri-macos
          cache-on-failure: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Debug build still compiles frontend + Rust + bundles the app, but skips
      # release optimizations (the ~13m bottleneck). Full release builds stay on
      # the Release workflow when merging to main.
      - name: Build (Apple Silicon, debug)
        run: pnpm tauri build --debug
